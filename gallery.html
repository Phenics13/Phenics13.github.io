<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="assets/css/style.min.css">
    
    <!-- Useful meta tags -->
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="robots" content="index, follow">
    <meta name="google" content="notranslate">
    <meta name="format-detection" content="telephone=no">
    <meta name="description" content="">
    
    <title>Sergei Dranchenko | Portfolio</title>
</head>
<body>

    <div class="page">
        <!-- Header -->
        <header class="header">
            <div class="container">
                <div class="header__inner">
                    <div class="header-logo">
                        <img src="assets/images/logo.png" alt="logo">
                    </div>
            
                    <div class="header-nav">
                        <a href="index.html" class="link">Главная</a>
                        <a href="gallery.html" class="link">Галерея</a>
                        <a href="contacts.html" class="link">Контакты</a>
                    </div>
                </div>
                <div class="cancel-button">
                    <img src="assets/images/menu-burger/menu-cancel.png" alt="menu-cancel">
                </div>
            </div>
        </header>
        
        <div class="menu-burger">
            <img src="assets/images/menu-burger/menu-burger.png" alt="menu-burger">
        </div>
        
        
        <!-- Main -->
        <main class="main">
            
            <div class="gallery">
                <div class="container">
                    <div class="section">
                        <div class="gallery__title title _anim">
                            <h1>Галерея</h1>
                        </div>
                        <div class="gallery__content">
                            <img src="assets/images/pic.png" alt="gallery" class="gallery__img _anim">
                            <div class="gallery__text _anim">
                                <p class="gallery__item">
                                    Здесь собраны все мои лучшие фотографии. 
                                </p>
                                <p class="gallery__item">
                                    Смотрите, наслаждайтесь и не забудьте прихватить 
                                    с собой чашку гарячого кофе :)
                                </p>
                            </div>
                        </div>
            
                        <div class="section1 gallery__inner">
                            <div class="pic1"><img src="assets/images/gallery/rose.png" alt="rose" class="gallery__pic"></div>
                            <div class="pic2"><img src="assets/images/gallery/cakeworld.png" alt="cakeworld" class="gallery__pic"></div>
                            <div class="pic3"><img src="assets/images/gallery/rightnight.png" alt="rightnight" class="gallery__pic"></div>
                            <div class="pic4"><img src="assets/images/gallery/readtime.png" alt="readtime" class="gallery__pic"></div>
                            <div class="pic5"><img src="assets/images/gallery/sunflower.png" alt="sunflower" class="gallery__pic"></div>
                        </div>
                        <div class="section2 gallery__inner">
                            <div class="pic6"><img src="assets/images/gallery/decade.png" alt="decade" class="gallery__pic"></div>
                            <div class="pic7"><img src="assets/images/gallery/sunset.png" alt="sunset" class="gallery__pic"></div>
                            <div class="pic8"><img src="assets/images/gallery/charch.png" alt="charch" class="gallery__pic"></div>
                            <div class="pic9"><img src="assets/images/gallery/flower.png" alt="flower" class="gallery__pic"></div>
                            <div class="pic10"><img src="assets/images/gallery/winter.png" alt="winter" class="gallery__pic"></div>
                            <div class="pic11"><img src="assets/images/gallery/car.png" alt="car" class="gallery__pic"></div>
                        </div>
                        <div class="section3 gallery__inner">
                            <div class="pic12"><img src="assets/images/gallery/choco.png" alt="choco" class="gallery__pic"></div>
                            <div class="pic13"><img src="assets/images/gallery/bee.png" alt="bee" class="gallery__pic"></div>
                            <div class="pic14"><img src="assets/images/gallery/bird.png" alt="bird" class="gallery__pic"></div>
                        </div>
                    </div>
            
                    
            
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="container">
                <div class="footer__inner">
                    <div class="footer__item">
                        <img src="assets/images/location.png" alt="location" class="footer__img">
                        <a href="https://goo.su/8hd4" target="_blank">Kharkiv</a>
                    </div>
                    <div class="footer__item">
                        <img src="assets/images/gmail.png" alt="email" class="footer__img">
                        <a href="mailto:serhii.dranchenko@nure.ua?subject=Заказ%20фотосесии">serhii.dranchenko@nure.ua</a>
                    </div>
                    <div class="footer__item">
                        <img src="assets/images/instagram.png" alt="instagram" class="footer__img">
                        <a href="https://www.instagram.com/sergeidranchenko/" target="_blank">@sergeidranchenko</a>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <!-- Modal Window -->
    <div class="modal" id="modal">
        <div class="pop-up">
            <div id="left-button">
                <img src="assets/images/left-white.png" alt="left-button">
            </div>
            <div class="pop-up__item">
                <img src="https://imgholder.ru/800x500/8493a8/adb9ca&text=IMAGE+HOLDER&font=kelson" alt="current-pic" id="current-pic">
            </div>
            <div id="right-button">
                <img src="assets/images/right-white.png" alt="right-button">
            </div>
            <div id="cancel-button">
                <img src="assets/images/cancel.png" alt="cancel-button">
            </div>
        </div>
    </div>
    
    <div id="top-button">
        <img src="assets/images/toTop.png" alt="return-to-start">
    </div>
    <!-- JS -->
    <script src="assets/js/app.js"></script>
    <noscript>
        <p>Для полноценной работы сайта требуется включить JavaScript в вашем браузере</p>
        <style>
            .main, .main * {
                opacity: 1 !important;
                transform: translate(0, 0) !important;
            }
        </style>
    </noscript>
</body>
</html>
